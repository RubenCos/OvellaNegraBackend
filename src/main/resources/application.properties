# ??? Datasource ???????????????????????????????????????????????
spring.config.import=optional:file:./env.properties
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante_db?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=${db_user}
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ??? JPA / Hibernate ??????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ??? Servidor ?????????????????????????????????????????????????
server.port=8080

# ??? Logs ?????????????????????????????????????????????????????
logging.level.com.restaurante=DEBUG


# ??? CORS ?????????????????????????????????????????????????????
# AŮade aquŪ todos los orŪgenes que necesiten acceder al backend.
# Desarrollo local (IntelliJ built-in server, Vite, etc.)
cors.allowed-origins=http://localhost:63343,http://localhost:5173,http://localhost:3000,http://localhost:63342

